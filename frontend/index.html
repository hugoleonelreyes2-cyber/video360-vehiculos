<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de video 360 — Vehículos</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  :root {
    --bg: #f6f5f2;
    --panel: #ffffff;
    --border: #dedad2;
    --text: #26251f;
    --text-muted: #6b685f;
    --accent: #0f6e56;
    --accent-fondo: #e1f5ee;
    --warn: #854f0b;
    --warn-fondo: #faeeda;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header p { margin: 4px 0 0; color: var(--text-muted); font-size: 13px; }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-muted);
  }

  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }

  .id-row { display: flex; gap: 12px; }
  .id-row input {
    flex: 1;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
  }

  .angulos {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .angulo-slot {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s;
  }
  .angulo-slot:hover { border-color: var(--accent); }
  .angulo-slot.lleno { border-style: solid; border-color: var(--accent); background: var(--accent-fondo); }
  .angulo-slot .nombre { font-weight: 600; font-size: 13px; }
  .angulo-slot .estado { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .angulo-slot input[type="file"] { display: none; }

  .config-fila { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .config-fila label { flex: 0 0 160px; margin: 0; }
  .config-fila input[type="range"] { flex: 1; }
  .config-fila select { flex: 1; padding: 6px; border: 1px solid var(--border); border-radius: 6px; }
  .config-valor { width: 48px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text-muted); font-size: 13px; }

  button {
    font: inherit;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    cursor: pointer;
  }
  .btn-primario { background: var(--accent); color: #fff; }
  .btn-primario:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
  .btn-secundario { background: var(--bg); color: var(--text); border: 1px solid var(--border); }

  .estado-job {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--warn-fondo);
    color: var(--warn);
  }
